<h2 mat-dialog-title>{{ data.transaction ? 'Edit Transaction' : 'New Transaction' }}</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" style="width:100%;margin-top:8px">
    <mat-label>Category</mat-label>
    <mat-select [ngModel]="selectedCategoryId" (ngModelChange)="onCategoryChange($event)">
      <mat-option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Product</mat-label>
    <mat-select [(ngModel)]="form.product">
      <mat-option *ngFor="let p of products" [value]="p.id">{{ p.name }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:48%;margin-right:4%">
    <mat-label>Quantity</mat-label>
    <input matInput type="number" [(ngModel)]="form.quantity" min="1">
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:48%">
    <mat-label>Unit Price ($)</mat-label>
    <input matInput type="number" [(ngModel)]="form.unit_price" min="0">
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:48%;margin-right:4%">
    <mat-label>Region</mat-label>
    <mat-select [(ngModel)]="form.region">
      <mat-option *ngFor="let r of regions" [value]="r">{{ r | titlecase }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:48%">
    <mat-label>Sale Date</mat-label>
    <input matInput [matDatepicker]="picker" [(ngModel)]="form.sale_date_obj">
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
