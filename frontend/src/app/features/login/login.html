<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <mat-icon class="login-icon">insights</mat-icon>
      <h1>DataPulse</h1>
      <p>Sales Analytics Dashboard</p>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Username</mat-label>
      <input matInput [(ngModel)]="username" (keyup.enter)="submit()" autocomplete="username">
      <mat-icon matPrefix>person</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="password" (keyup.enter)="submit()" autocomplete="current-password">
      <mat-icon matPrefix>lock</mat-icon>
      <button mat-icon-button matSuffix type="button" (click)="hidePassword=!hidePassword">
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <button mat-flat-button color="primary" (click)="submit()" [disabled]="loading">
      <mat-spinner *ngIf="loading" diameter="20" class="btn-spinner"></mat-spinner>
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

    <p class="demo-hint">Demo: <strong>admin</strong> / <strong>admin123</strong></p>

    <p class="auth-link">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </mat-card>
</div>
