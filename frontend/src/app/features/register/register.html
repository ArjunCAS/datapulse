<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <mat-icon class="login-icon">insights</mat-icon>
      <h1>DataPulse</h1>
      <p>Create your account</p>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Username</mat-label>
      <input matInput [(ngModel)]="form.username" autocomplete="username">
      <mat-icon matPrefix>person</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" [(ngModel)]="form.email" autocomplete="email">
      <mat-icon matPrefix>email</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>First Name</mat-label>
      <input matInput [(ngModel)]="form.first_name">
      <mat-icon matPrefix>badge</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Last Name</mat-label>
      <input matInput [(ngModel)]="form.last_name">
      <mat-icon matPrefix>badge</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="form.password" autocomplete="new-password">
      <mat-icon matPrefix>lock</mat-icon>
      <button mat-icon-button matSuffix type="button" (click)="hidePassword=!hidePassword">
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <button mat-flat-button color="primary" (click)="submit()" [disabled]="loading">
      <mat-spinner *ngIf="loading" diameter="20" class="btn-spinner"></mat-spinner>
      {{ loading ? 'Creating account...' : 'Create Account' }}
    </button>

    <p class="auth-link">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </mat-card>
</div>
